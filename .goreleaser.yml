version: 2

project_name: goforge

builds:
  - id: goforge
    main: ./cmd/goforge
    binary: goforge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: goforge
    builds:
      - goforge

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
